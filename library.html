<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Library - The Academic Plug</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@400;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body class="ap-body" data-page="library">
  <header class="ap-header ap-shell simple-header">
    <a class="ap-brand" href="./index.html">
      <img class="ap-brand-logo" src="./assets/plug-logo.png" alt="The Academic Plug logo" />
      <span class="ap-brand-text solo">The Academic Plug</span>
    </a>
    <div class="dashboard-icons">
      <a class="pill-btn ghost tiny" data-library-subject-link href="./course.html">Subject</a>
      <a class="pill-btn yellow tiny" data-pluggpt-link href="#">PlugGPT</a>
    </div>
  </header>

  <main class="ap-shell course-main">
    <h1 class="page-title" data-library-title></h1>
    <p class="page-subtitle" data-library-subtitle></p>
    <div class="library-filter-note" data-library-filter-note></div>
    <nav class="library-tab-row" data-library-nav aria-label="Library views"></nav>
    <section class="panel subject-resource-panel hidden" data-library-subject-resources-panel>
      <div class="panel-topline">Subject-wide resources</div>
      <div class="resource-pill-list" data-library-subject-resources></div>
    </section>
    <section class="unit-library-grid revision-grid" data-unit-library></section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./supabase-config.js"></script>
  <script src="./site.js" defer></script>
</body>
</html>
